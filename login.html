<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>зҷ»еҪ• - AIеҲӣеўғ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white/10 p-8 rounded-2xl backdrop-blur">
    <h2 class="text-2xl font-bold text-center mb-6">AIеҲӣеўғ - зҷ»еҪ•/жіЁеҶҢ</h2>

    <input id="email" type="email" placeholder="йӮ®з®ұ" class="w-full p-3 rounded-lg mb-3 bg-white/10 border border-white/20">
    <input id="password" type="password" placeholder="еҜҶз Ғ" class="w-full p-3 rounded-lg mb-4 bg-white/10 border border-white/20">

    <button onclick="login()" class="w-full bg-indigo-600 p-3 rounded-lg font-bold mb-2">зҷ»еҪ•</button>
    <button onclick="register()" class="w-full bg-purple-600 p-3 rounded-lg font-bold">жіЁеҶҢ</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
